<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Erreur - Delis Divin</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #f8f9fa;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .error-card {
            background-color: white;
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.05);
            text-align: center;
            max-width: 500px;
        }
    </style>
</head>
<body>

    <div class="error-card animate-fade-in">
        <i class="bi bi-exclamation-triangle-fill text-danger display-1 mb-4"></i>
        <h2 class="fw-bold text-dark mb-2" th:text="${status} + ' - ' + ${error}">Erreur</h2>
        <p class="text-muted mb-4" th:text="${message}">Une erreur inattendue est survenue.</p>
        <a href="/" class="btn btn-primary rounded-pill px-4"><i class="bi bi-house-door me-2"></i>Retour à l'accueil</a>
    </div>

</body>
</html>
