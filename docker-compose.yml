version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: delis_divin_db
    environment:
      - POSTGRES_DB=delis_divin
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d delis_divin"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: delis_divin_app
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/delis_divin
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
      - SPRING_MAIL_HOST=localhost
      - SPRING_MAIL_PORT=25
      - APP_UPLOAD_DIR=/app/uploads
      - APP_BACKUP_DIR=/app/backups
      - PG_DUMP_PATH=/usr/bin/pg_dump
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - app_uploads:/app/uploads
      - app_backups:/app/backups
    restart: always

  nginx:
    image: nginx:1.25-alpine
    container_name: delis_divin_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    restart: always

volumes:
  postgres_data:
  app_uploads:
  app_backups:
