<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${restaurant.name} + ' - Delis Divin'"></title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #f8f9fa;
        }
        .restaurant-header {
            background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.6)), 
                        url('https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?q=80&w=1470') no-repeat center center/cover;
            color: white;
            padding: 80px 0 40px 0;
            margin-bottom: 40px;
        }
        .category-nav {
            position: sticky;
            top: 70px;
            background-color: white;
            z-index: 100;
            padding: 15px 0;
            border-radius: var(--border-radius);
            box-shadow: var(--card-shadow);
            margin-bottom: 30px;
        }
        .category-nav-link {
            color: var(--gray-medium);
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 500;
            transition: all 0.3s ease;
            white-space: nowrap;
        }
        .category-nav-link:hover, .category-nav-link.active {
            background-color: var(--primary-light);
            color: var(--primary-color);
        }
        .product-card {
            border: none;
            border-radius: var(--border-radius);
            box-shadow: var(--card-shadow);
            overflow: hidden;
            background-color: white;
            transition: all 0.3s ease;
        }
        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--hover-shadow);
        }
        .product-img {
            height: 180px;
            object-fit: cover;
        }
        .cart-sticky {
            position: sticky;
            top: 70px;
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm sticky-top">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center gap-2 fw-bold text-primary" href="/">
                <img th:src="@{'/images/logo delisdivin.png'}" style="height: 40px; object-fit: contain;" alt="Delis Divin Logo">
                <span style="font-size: 1.5rem; letter-spacing: -0.5px;">Delis Divin</span>
            </a>
            <div class="d-flex align-items-center gap-3">
                <a href="/" class="btn btn-outline-secondary rounded-pill btn-sm px-3"><i class="bi bi-arrow-left me-1"></i>Retour Accueil</a>
            </div>
        </div>
    </nav>

    <!-- Restaurant Banner -->
    <header class="restaurant-header text-center" th:style="'background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.7)), url(' + (${restaurant.bannerUrl != null && !#strings.isEmpty(restaurant.bannerUrl)} ? ${restaurant.bannerUrl} : 'https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?q=80&w=1470') + ') no-repeat center center/cover;'">
        <div class="container">
            <h1 class="display-5 fw-bold text-uppercase" th:text="${restaurant.name}"></h1>
            <p class="lead opacity-75" th:text="${restaurant.description}"></p>
            <div class="d-flex justify-content-center gap-3 mt-3">
                <span><i class="bi bi-geo-alt me-1 text-warning"></i> <span th:text="${restaurant.address}"></span></span>
                <span><i class="bi bi-telephone me-1 text-warning"></i> <span th:text="${restaurant.phone}"></span></span>
                <span><i class="bi bi-star-fill me-1 text-warning"></i> <span th:text="${#numbers.formatDecimal(restaurant.rating, 1, 1)}">4.5</span></span>
            </div>
        </div>
    </header>

    <!-- Content -->
    <div class="container my-5">
        <div class="row g-4">
            <!-- Left Column: Menu Items -->
            <div class="col-lg-8">
                <!-- Categories Bar -->
                <div class="category-nav d-flex gap-2 overflow-x-auto px-3">
                    <a href="#all" class="category-nav-link active">Tout le Menu</a>
                    <a th:each="cat : ${categories}" 
                       th:href="'#cat-' + ${cat.id}" 
                       th:text="${cat.name}" 
                       class="category-nav-link"></a>
                </div>

                <!-- Products -->
                <div class="d-flex flex-column gap-5">
                    <div th:each="cat : ${categories}" th:id="'cat-' + ${cat.id}">
                        <h4 class="fw-bold mb-4 text-primary border-bottom pb-2" th:text="${cat.name}"></h4>
                        
                        <div class="row g-3">
                            <!-- Filter products in category -->
                            <div class="col-md-6" th:each="product : ${products}" th:if="${product.categoryId == cat.id}">
                                <div class="card product-card h-100">
                                    <img th:src="${product.imageUrl != null && !#strings.isEmpty(product.imageUrl)} ? ${product.imageUrl} : 'https://images.unsplash.com/photo-1546069901-ba9599a7e63c?q=80&w=600'" 
                                         class="product-img" alt="Menu Item">
                                    <div class="card-body p-4 d-flex flex-column justify-content-between">
                                        <div>
                                            <h5 class="fw-bold text-dark" th:text="${product.name}"></h5>
                                            <p class="text-muted small" th:text="${product.description}"></p>
                                        </div>
                                        <div class="d-flex align-items-center justify-content-between mt-3">
                                            <span class="fs-5 fw-bold text-primary" th:text="${#numbers.formatDecimal(product.price, 0, 'POINT', 0, 'COMMA')} + ' FCFA'"></span>
                                            <button class="btn btn-primary rounded-pill px-3 py-1 btn-sm btn-add-to-cart"
                                                    th:data-id="${product.id}"
                                                    th:data-name="${product.name}"
                                                    th:data-price="${product.price}">
                                                <i class="bi bi-plus-lg me-1"></i> Ajouter
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right Column: Interactive Shopping Cart (Panier) -->
            <div class="col-lg-4">
                <div class="card premium-card cart-sticky p-4">
                    <h5 class="fw-bold text-primary mb-4 border-bottom pb-3"><i class="bi bi-cart3 me-2"></i>Mon Panier</h5>
                    
                    <div id="cartItemsList" class="d-flex flex-column gap-3 mb-4" style="max-height: 300px; overflow-y: auto;">
                        <!-- JS populated cart list -->
                        <div class="text-center text-muted py-4">
                            <i class="bi bi-cart-x fs-1 opacity-50"></i>
                            <p class="mt-2 mb-0">Votre panier est vide</p>
                        </div>
                    </div>

                    <div class="border-top pt-3 mb-4">
                        <div class="d-flex justify-content-between text-muted mb-1 small">
                            <span>Sous-total:</span>
                            <span id="cartSubtotal">0 FCFA</span>
                        </div>
                        <div class="d-flex justify-content-between text-muted mb-2 small">
                            <span>TVA (18%):</span>
                            <span id="cartTax">0 FCFA</span>
                        </div>
                        <div class="d-flex justify-content-between fw-bold fs-5 text-dark">
                            <span>Total:</span>
                            <span id="cartTotal">0 FCFA</span>
                        </div>
                    </div>

                    <!-- Checkout form -->
                    <form id="checkoutForm" class="d-none">
                        <h6 class="fw-bold mb-3 text-secondary border-bottom pb-2">Détails de la commande</h6>
                        
                        <div class="mb-3">
                            <label for="clientName" class="form-label small fw-bold text-muted">Nom Complet</label>
                            <input type="text" class="form-control form-control-sm bg-light" id="clientName" required>
                        </div>

                        <div class="mb-3">
                            <label for="clientPhone" class="form-label small fw-bold text-muted">Numéro Téléphone</label>
                            <input type="text" class="form-control form-control-sm bg-light" id="clientPhone" placeholder="Ex: 77 123 45 67" required>
                        </div>

                        <div class="mb-3">
                            <label for="orderType" class="form-label small fw-bold text-muted">Type de Commande</label>
                            <select id="orderType" class="form-select form-select-sm bg-light" onchange="toggleOrderFields()" required>
                                <option value="IN_REST">Sur Place</option>
                                <option value="TAKE_AWAY">À Emporter</option>
                                <option value="DELIVERY">Livraison</option>
                            </select>
                        </div>

                        <!-- Table selection for inside restaurant orders -->
                        <div class="mb-3" id="tableSelectionBlock">
                            <label for="tableId" class="form-label small fw-bold text-muted">Table</label>
                            <select id="tableId" class="form-select form-select-sm bg-light">
                                <option value="">Choisir une Table</option>
                                <option th:each="tbl : ${tables}" th:value="${tbl.id}" th:text="'Table N° ' + ${tbl.number} + ' (Capacité: ' + ${tbl.capacity} + ')'"></option>
                            </select>
                        </div>

                        <!-- Address selection for deliveries -->
                        <div class="mb-3 d-none" id="addressBlock">
                            <label for="clientAddress" class="form-label small fw-bold text-muted">Adresse de Livraison</label>
                            <input type="text" class="form-control form-control-sm bg-light" id="clientAddress">
                        </div>

                        <button type="submit" class="btn btn-primary w-100 rounded-pill py-2.5 fw-bold mt-2">Valider la Commande</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Client-side Panier JavaScript -->
    <script th:inline="javascript">
        let cart = [];
        const restaurantId = [[${restaurant.id}]];

        document.addEventListener('click', function(e) {
            const btn = e.target.closest('.btn-add-to-cart');
            if (btn) {
                const id = parseInt(btn.getAttribute('data-id'));
                const name = btn.getAttribute('data-name');
                const price = parseFloat(btn.getAttribute('data-price'));
                addToCart(id, name, price);
            }
        });

        function addToCart(id, name, price) {
            const existing = cart.find(item => item.id === id);
            if (existing) {
                existing.quantity += 1;
            } else {
                cart.push({ id, name, price, quantity: 1 });
            }
            updateCartUI();
        }

        function updateQuantity(id, change) {
            const item = cart.find(item => item.id === id);
            if (item) {
                item.quantity += change;
                if (item.quantity <= 0) {
                    cart = cart.filter(i => i.id !== id);
                }
            }
            updateCartUI();
        }

        function updateCartUI() {
            const listDiv = document.getElementById('cartItemsList');
            const subtotalSpan = document.getElementById('cartSubtotal');
            const taxSpan = document.getElementById('cartTax');
            const totalSpan = document.getElementById('cartTotal');
            const form = document.getElementById('checkoutForm');

            if (cart.length === 0) {
                listDiv.innerHTML = `
                    <div class="text-center text-muted py-4">
                        <i class="bi bi-cart-x fs-1 opacity-50"></i>
                        <p class="mt-2 mb-0">Votre panier est vide</p>
                    </div>
                `;
                subtotalSpan.textContent = '0 FCFA';
                taxSpan.textContent = '0 FCFA';
                totalSpan.textContent = '0 FCFA';
                form.classList.add('d-none');
                return;
            }

            form.classList.remove('d-none');
            listDiv.innerHTML = '';
            let subtotal = 0;

            cart.forEach(item => {
                const itemTotal = item.price * item.quantity;
                subtotal += itemTotal;

                const row = document.createElement('div');
                row.className = 'd-flex align-items-center justify-content-between border-bottom pb-2';
                row.innerHTML = `
                    <div class="flex-grow-1">
                        <h6 class="mb-0 fw-bold small text-dark">${item.name}</h6>
                        <span class="text-muted small">${item.price.toLocaleString()} FCFA</span>
                    </div>
                    <div class="d-flex align-items-center gap-2">
                        <button class="btn btn-outline-secondary btn-xs rounded-circle p-0" style="width: 24px; height: 24px;" onclick="updateQuantity(${item.id}, -1)">-</button>
                        <span class="small fw-bold">${item.quantity}</span>
                        <button class="btn btn-outline-secondary btn-xs rounded-circle p-0" style="width: 24px; height: 24px;" onclick="updateQuantity(${item.id}, 1)">+</button>
                    </div>
                    <span class="small fw-bold text-dark ms-2">${itemTotal.toLocaleString()} FCFA</span>
                `;
                listDiv.appendChild(row);
            });

            const taxRate = 0.18;
            const tax = subtotal * taxRate;
            const total = subtotal + tax;

            subtotalSpan.textContent = subtotal.toLocaleString() + ' FCFA';
            taxSpan.textContent = tax.toLocaleString() + ' FCFA';
            totalSpan.textContent = total.toLocaleString() + ' FCFA';
        }

        function toggleOrderFields() {
            const type = document.getElementById('orderType').value;
            const tableBlock = document.getElementById('tableSelectionBlock');
            const addressBlock = document.getElementById('addressBlock');

            if (type === 'IN_REST') {
                tableBlock.classList.remove('d-none');
                addressBlock.classList.add('d-none');
                document.getElementById('tableId').required = true;
                document.getElementById('clientAddress').required = false;
            } else if (type === 'DELIVERY') {
                tableBlock.classList.add('d-none');
                addressBlock.classList.remove('d-none');
                document.getElementById('tableId').required = false;
                document.getElementById('clientAddress').required = true;
            } else {
                tableBlock.classList.add('d-none');
                addressBlock.classList.add('d-none');
                document.getElementById('tableId').required = false;
                document.getElementById('clientAddress').required = false;
            }
        }

        document.getElementById('checkoutForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const orderType = document.getElementById('orderType').value;
            const tableId = document.getElementById('tableId').value;

            const orderPayload = {
                clientName: document.getElementById('clientName').value,
                clientPhone: document.getElementById('clientPhone').value,
                clientAddress: document.getElementById('clientAddress').value || null,
                type: orderType,
                tableId: orderType === 'IN_REST' && tableId ? parseInt(tableId) : null,
                orderItems: cart.map(item => ({
                    productId: item.id,
                    quantity: item.quantity,
                    price: item.price
                }))
            };

            fetch(`/api/public/restaurant/${restaurantId}/orders`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(orderPayload)
            })
            .then(async response => {
                if (response.ok) {
                    return response.json();
                } else {
                    const err = await response.json();
                    throw new Error(err.message || "Erreur de validation de la commande");
                }
            })
            .then(order => {
                alert(`Votre commande #${order.id} a été enregistrée ! Vous allez être notifié dès qu'elle sera prête.`);
                cart = [];
                updateCartUI();
                document.getElementById('checkoutForm').reset();
                toggleOrderFields();
            })
            .catch(err => {
                alert("Erreur: " + err.message);
            });
        });
    </script>
</body>
</html>
