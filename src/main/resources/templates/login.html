<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - Delis Divin</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #f5f6fa 0%, #eef0f7 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            border: none;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
            background: white;
            overflow: hidden;
            width: 100%;
            max-width: 450px;
        }
        .login-header {
            background: var(--primary-gradient);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }
        .form-control {
            border-radius: 8px;
            padding: 12px;
            border: 1px solid #e2e8f0;
        }
        .form-control:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px var(--primary-light);
        }
    </style>
</head>
<body>

    <div class="login-card animate-fade-in">
        <div class="login-header">
            <a href="/" class="text-white text-decoration-none d-flex align-items-center justify-content-center gap-2 mb-2">
                <img th:src="@{'/images/logo delisdivin.png'}" style="height: 45px; object-fit: contain; filter: brightness(0) invert(1);" alt="Delis Divin Logo">
                <span class="fw-bold fs-3">Delis Divin</span>
            </a>
            <p class="mb-0 opacity-75">Connectez-vous pour gérer vos commandes</p>
        </div>
        
        <div class="p-4 p-md-5">
            <div id="errorMessage" class="alert alert-danger d-none" role="alert"></div>

            <form id="loginForm">
                <div class="mb-3">
                    <label for="username" class="form-label small fw-bold text-muted text-uppercase">Adresse Email</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i class="bi bi-envelope text-muted"></i></span>
                        <input type="email" class="form-control border-start-0 bg-light text-dark" id="username" placeholder="exemple@delisdivin.com" required>
                    </div>
                </div>

                <div class="mb-4">
                    <label for="password" class="form-label small fw-bold text-muted text-uppercase">Mot de passe</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock text-muted"></i></span>
                        <input type="password" class="form-control border-start-0 bg-light" id="password" placeholder="Saisissez votre mot de passe" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary w-100 rounded-pill py-3 fw-bold mb-3">Se Connecter</button>
                
            </form>
        </div>
    </div>

    <!-- AJAX Login Script -->
    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const usernameVal = document.getElementById('username').value;
            const passwordVal = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMessage');
            
            errorDiv.classList.add('d-none');

            fetch('/api/auth/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    username: usernameVal,
                    password: passwordVal
                })
            })
            .then(async response => {
                if (response.ok) {
                    return response.json();
                } else {
                    const errData = await response.json();
                    throw new Error(errData.message || "Identifiants invalides");
                }
            })
            .then(data => {
                // Save token in LocalStorage
                localStorage.setItem('token', data.token);
                localStorage.setItem('refreshToken', data.refreshToken);
                localStorage.setItem('user', JSON.stringify(data.user));

                // Save token in Cookie for Server-Side Thymeleaf authorization
                document.cookie = "jwt=" + data.token + "; path=/; max-age=" + (24 * 60 * 60) + "; SameSite=Lax";

                // Redirect based on role
                const role = data.user.role;
                if (role === 'SUPER_ADMIN') {
                    window.location.href = '/super-admin/dashboard';
                } else if (role === 'RESTAURANT_ADMIN') {
                    window.location.href = '/restaurant-admin/dashboard';
                } else if (role === 'CHEF') {
                    window.location.href = '/kitchen/dashboard';
                } else if (role === 'SERVER') {
                    window.location.href = '/server/dashboard';
                } else if (role === 'CASHIER') {
                    window.location.href = '/cashier/dashboard';
                } else if (role === 'DELIVERY') {
                    window.location.href = '/delivery/dashboard';
                } else {
                    window.location.href = '/';
                }
            })
            .catch(error => {
                errorDiv.textContent = error.message;
                errorDiv.classList.remove('d-none');
            });
        });
    </script>
</body>
</html>
