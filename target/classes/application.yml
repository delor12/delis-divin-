server:
  port: 8085
  servlet:
    session:
      timeout: 30m

spring:
  application:
    name: delis-divin
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:mem:delis_divin;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  mail:
    host: ${SPRING_MAIL_HOST:localhost}
    port: ${SPRING_MAIL_PORT:25}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# Custom Application Properties
app:
  jwt:
    secret: 9a67471b79b5c321028717b07d9f7831d7986047ff1a2b8e398dc3a12dcd342f1f5bc912384a7e91bd5c120302b1f3c3191f6305a2dfef2f321d51a9aef902b3
    expiration-ms: 86400000 # 24 hours
    refresh-expiration-ms: 604800000 # 7 days
  upload:
    dir: ${APP_UPLOAD_DIR:./uploads}
  backup:
    dir: ${APP_BACKUP_DIR:./backups}
    pg-dump-path: ${PG_DUMP_PATH:/usr/bin/pg_dump}

# Spring Actuator configuration for monitoring
management:
  endpoints:
    web:
      exposure:
        include: "health,info,metrics,prometheus"
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true

# Logging configuration
logging:
  level:
    root: INFO
    com.delisdivin: DEBUG
    org.springframework.security: INFO
