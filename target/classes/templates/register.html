<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Créer mon Restaurant - Delis Divin</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #f5f6fa 0%, #eef0f7 100%);
            min-height: 100vh;
            padding: 50px 0;
        }
        .register-card {
            border: none;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
            background: white;
            overflow: hidden;
            width: 100%;
            max-width: 800px;
            margin: auto;
        }
        .register-header {
            background: var(--primary-gradient);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .form-control, .form-select {
            border-radius: 8px;
            padding: 10px;
            border: 1px solid #e2e8f0;
        }
        .form-control:focus, .form-select:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px var(--primary-light);
        }
    </style>
</head>
<body>

    <div class="register-card animate-fade-in">
        <div class="register-header">
            <a href="/" class="text-white text-decoration-none d-flex align-items-center justify-content-center gap-2 mb-2">
                <img th:src="@{'/images/logo delisdivin.png'}" style="height: 45px; object-fit: contain; filter: brightness(0) invert(1);" alt="Delis Divin Logo">
                <span class="fw-bold fs-3">Delis Divin</span>
            </a>
            <p class="mb-0 opacity-75">Rejoignez la plateforme et commencez à digitaliser votre restaurant</p>
        </div>

        <div class="p-4 p-md-5">
            <div id="errorMessage" class="alert alert-danger d-none" role="alert"></div>
            <div id="successMessage" class="alert alert-success d-none" role="alert"></div>

            <form id="registerForm">
                <div class="row g-4">
                    <!-- Column 1: Restaurant Info -->
                    <div class="col-md-6 border-end">
                        <h5 class="fw-bold mb-4 text-primary"><i class="bi bi-shop me-2"></i>Informations du Restaurant</h5>
                        
                        <div class="mb-3">
                            <label for="restName" class="form-label small fw-bold text-muted">Nom du Restaurant</label>
                            <input type="text" class="form-control bg-light" id="restName" placeholder="Ex: Le Cordon Bleu" required>
                        </div>
                        
                        <div class="mb-3">
                            <label for="restEmail" class="form-label small fw-bold text-muted">Email de Contact</label>
                            <input type="email" class="form-control bg-light" id="restEmail" placeholder="contact@restaurant.com" required>
                        </div>
                        
                        <div class="mb-3">
                            <label for="restPhone" class="form-label small fw-bold text-muted">Téléphone</label>
                            <input type="text" class="form-control bg-light" id="restPhone" placeholder="Ex: +221 77 000 00 00" required>
                        </div>
                        
                        <div class="mb-3">
                            <label for="restCity" class="form-label small fw-bold text-muted">Ville</label>
                            <select id="restCity" class="form-select bg-light" required>
                                <option value="" disabled selected>Sélectionner la Ville</option>
                                <option th:each="city : ${cities}" th:value="${city.id}" th:text="${city.name}"></option>
                            </select>
                        </div>
                        
                        <div class="mb-3">
                            <label for="restAddress" class="form-label small fw-bold text-muted">Adresse Complète</label>
                            <input type="text" class="form-control bg-light" id="restAddress" placeholder="Ex: Rue 12, Plateau" required>
                        </div>
                    </div>

                    <!-- Column 2: Account Owner Info -->
                    <div class="col-md-6">
                        <h5 class="fw-bold mb-4 text-primary"><i class="bi bi-person me-2"></i>Compte Administrateur</h5>
                        
                        <div class="mb-3">
                            <label for="username" class="form-label small fw-bold text-muted">Identifiant unique</label>
                            <input type="text" class="form-control bg-light" id="username" placeholder="Ex: admin_cordonbleu" required>
                        </div>

                        <div class="mb-3">
                            <label for="email" class="form-label small fw-bold text-muted">Adresse Email Perso</label>
                            <input type="email" class="form-control bg-light" id="email" placeholder="admin@gmail.com" required>
                        </div>

                        <div class="row g-2 mb-3">
                            <div class="col">
                                <label for="firstName" class="form-label small fw-bold text-muted">Prénom</label>
                                <input type="text" class="form-control bg-light" id="firstName" placeholder="Jean" required>
                            </div>
                            <div class="col">
                                <label for="lastName" class="form-label small fw-bold text-muted">Nom</label>
                                <input type="text" class="form-control bg-light" id="lastName" placeholder="Dupont" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="phone" class="form-label small fw-bold text-muted">Téléphone Perso</label>
                            <input type="text" class="form-control bg-light" id="phone" placeholder="Ex: +221 77 111 11 11" required>
                        </div>

                        <div class="mb-4">
                            <label for="password" class="form-label small fw-bold text-muted">Mot de passe</label>
                            <input type="password" class="form-control bg-light" id="password" placeholder="Min. 6 caractères" required>
                        </div>
                    </div>
                </div>

                <div class="border-top pt-4 mt-4 text-center">
                    <button type="submit" class="btn btn-primary rounded-pill px-5 py-3 fw-bold mb-3">Créer mon Restaurant & Compte</button>
                    <div>
                        <span class="text-muted small">Déjà inscrit ? </span>
                        <a href="/login" class="small text-primary text-decoration-none fw-bold">Se connecter</a>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <!-- AJAX Registration Script -->
    <script>
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const errorDiv = document.getElementById('errorMessage');
            const successDiv = document.getElementById('successMessage');
            errorDiv.classList.add('d-none');
            successDiv.classList.add('d-none');

            // 1. Create Restaurant first
            const restaurantData = {
                name: document.getElementById('restName').value,
                email: document.getElementById('restEmail').value,
                phone: document.getElementById('restPhone').value,
                address: document.getElementById('restAddress').value,
                cityId: parseInt(document.getElementById('restCity').value),
                priceRange: "Medium",
                averagePrepTime: 25,
                active: true
            };

            const token = localStorage.getItem('token');
            fetch('/api/super-admin/restaurants', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + token
                },
                body: JSON.stringify(restaurantData)
            })
            .then(async response => {
                if (response.ok) {
                    return response.json();
                } else {
                    const err = await response.json();
                    throw new Error(err.message || "Erreur lors de la création du restaurant");
                }
            })
            .then(createdRestaurant => {
                // 2. Create Owner User Account with newly created restaurantId
                const userData = {
                    username: document.getElementById('username').value,
                    email: document.getElementById('email').value,
                    password: document.getElementById('password').value,
                    firstName: document.getElementById('firstName').value,
                    lastName: document.getElementById('lastName').value,
                    phone: document.getElementById('phone').value,
                    role: "RESTAURANT_ADMIN",
                    restaurantId: createdRestaurant.id
                };

                return fetch('/api/auth/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(userData)
                });
            })
            .then(async response => {
                if (response.ok) {
                    return response.json();
                } else {
                    const err = await response.json();
                    throw new Error(err.message || "Erreur lors de la création du compte administrateur");
                }
            })
            .then(createdUser => {
                successDiv.textContent = "Votre restaurant et compte administrateur ont été créés avec succès ! Redirection vers la page de connexion...";
                successDiv.classList.remove('d-none');
                setTimeout(() => {
                    window.location.href = '/login';
                }, 3000);
            })
            .catch(error => {
                errorDiv.textContent = error.message;
                errorDiv.classList.remove('d-none');
            });
        });
    </script>
</body>
</html>
